<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Globe</title>
    <style>
      /* ── Design tokens ──────────────────────────────────────────────────── */
      :root {
        --bg:            #1f1f1f;
        --surface:       #282828;
        --surface-hi:    #313131;
        --border:        rgba(255, 255, 255, 0.08);
        --border-focus:  rgba(255, 255, 255, 0.28);
        --text:          #e2e2e2;
        --text-2:        #909090;
        --text-3:        #525252;
        --accent:        #e2e2e2;
      }

      /* ── Reset ──────────────────────────────────────────────────────────── */
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: transparent;
        width: 100%;
        height: 100%;
      }

      body {
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        color: var(--text);
      }

      /* ── Globe page layout ──────────────────────────────────────────────── */
      .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        height: 100vh;
        background: var(--bg);
      }

      .page-header {
        text-align: center;
      }

      .page-header h1 {
        font-size: 1.35rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--text);
        margin-bottom: 8px;
      }

      .page-header-meta {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .globe-layout {
        display: flex;
        align-items: center;
        gap: 32px;
      }

      .globe-hints {
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-width: 150px;
      }

      .globe-hints-spacer {
        min-width: 150px;
      }

      .hint-item {
        font-size: 0.8rem;
        color: var(--text-3);
        line-height: 1.5;
      }

      .hint-key {
        display: inline-block;
        font-weight: 600;
        color: var(--text-2);
      }

      #globe-container {
        width: 820px;
        height: 820px;
        flex-shrink: 0;
      }

      #globe-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #globe-controls {
        display: flex;
        justify-content: center;
      }

      .globe-ctrl-btn {
        padding: 6px 18px;
        border: 1px solid var(--border);
        border-radius: 100px;
        background: var(--surface);
        font-size: 0.78rem;
        font-family: inherit;
        color: var(--text-2);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }

      .globe-ctrl-btn:hover {
        background: var(--surface-hi);
        border-color: rgba(255, 255, 255, 0.16);
        color: var(--text);
      }

      /* ── Landing page ───────────────────────────────────────────────────── */
      .landing {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
        background: var(--bg);
      }

      .landing-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 52px 56px;
        width: 620px;
        max-width: 100%;
        box-shadow: 0 8px 64px rgba(0, 0, 0, 0.5);
      }

      .landing-title {
        font-size: 1.85rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 8px;
      }

      .landing-subtitle {
        color: var(--text-2);
        font-size: 1rem;
        margin-bottom: 36px;
        line-height: 1.6;
      }

      /* ── Form elements ──────────────────────────────────────────────────── */
      .form-group {
        margin-bottom: 20px;
      }

      .form-row {
        display: flex;
        gap: 12px;
      }

      .form-label {
        display: block;
        font-size: 0.88rem;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 7px;
        letter-spacing: 0.01em;
      }

      .form-input,
      .form-select {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 9px;
        font-size: 0.95rem;
        font-family: inherit;
        background: var(--bg);
        outline: none;
        transition: border-color 0.15s;
        color: var(--text);
      }

      .form-input:focus,
      .form-select:focus { border-color: var(--border-focus); }

      .form-input[readonly] {
        background: var(--surface-hi);
        color: var(--text-3);
        cursor: default;
      }

      .form-textarea {
        width: 100%;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 9px;
        font-size: 0.95rem;
        font-family: inherit;
        background: var(--bg);
        outline: none;
        transition: border-color 0.15s;
        resize: vertical;
        min-height: 80px;
        color: var(--text);
      }

      .form-textarea:focus { border-color: var(--border-focus); }

      /* select option styling for dark bg */
      .form-select option { background: var(--surface-hi); color: var(--text); }

      /* ── Radio group ────────────────────────────────────────────────────── */
      .radio-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .radio-option {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 14px 16px;
        border: 1px solid var(--border);
        border-radius: 11px;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }

      .radio-option:has(input:checked) {
        border-color: var(--border-focus);
        background: var(--surface-hi);
      }

      .radio-option input { margin-top: 3px; accent-color: var(--text); flex-shrink: 0; }

      .radio-option-label {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text);
      }

      .radio-option-desc {
        font-size: 0.85rem;
        color: var(--text-3);
        margin-top: 3px;
        line-height: 1.4;
      }

      /* ── Buttons ────────────────────────────────────────────────────────── */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 13px 24px;
        border-radius: 10px;
        border: none;
        font-size: 0.95rem;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: opacity 0.15s, background 0.15s;
        white-space: nowrap;
      }

      .btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-primary {
        background: var(--accent);
        color: #1a1a1a;
        width: 100%;
        margin-top: 8px;
        font-weight: 600;
      }

      .btn-primary:hover:not(:disabled) { opacity: 0.88; }

      .btn-ghost {
        background: transparent;
        color: var(--text-2);
        border: 1px solid var(--border);
      }

      .btn-ghost:hover:not(:disabled) { background: var(--surface-hi); }

      .btn-danger {
        background: #dc2626;
        color: #fff;
      }

      .btn-danger:hover:not(:disabled) { opacity: 0.85; }

      .btn-danger-outline {
        background: transparent;
        color: #f87171;
        border: 1px solid rgba(248, 113, 113, 0.3);
      }

      .btn-danger-outline:hover:not(:disabled) { background: rgba(220, 38, 38, 0.1); }

      .btn-copy {
        padding: 7px 13px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface-hi);
        font-size: 0.78rem;
        font-family: inherit;
        color: var(--text-2);
        cursor: pointer;
        white-space: nowrap;
        transition: background 0.15s, border-color 0.15s;
        flex-shrink: 0;
      }

      .btn-copy:hover { background: #3a3a3a; }
      .btn-copy.copied { border-color: rgba(74, 222, 128, 0.4); color: #4ade80; }

      /* ── Badges ─────────────────────────────────────────────────────────── */
      .mode-badge,
      .edit-badge,
      .pin-type-badge {
        display: inline-flex;
        align-items: center;
        padding: 3px 10px;
        border-radius: 100px;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      .mode-badge.mode-owner { background: rgba(239, 68, 68, 0.14); color: #f87171; }
      .mode-badge.mode-mixed { background: rgba(245, 158, 11, 0.14); color: #fbbf24; }
      .mode-badge.mode-open  { background: rgba(34, 197, 94, 0.14);  color: #4ade80; }

      .edit-badge { background: rgba(99, 102, 241, 0.16); color: #a5b4fc; }

      .pin-type-badge.marker { background: rgba(239, 68, 68, 0.14);  color: #f87171; margin-bottom: 12px; }
      .pin-type-badge.star   { background: rgba(245, 158, 11, 0.14); color: #fbbf24; margin-bottom: 12px; }
      .pin-type-badge.dot    { background: rgba(14, 165, 233, 0.14); color: #38bdf8; margin-bottom: 12px; }
      .pin-type-badge.gem    { background: rgba(16, 185, 129, 0.14); color: #34d399; margin-bottom: 12px; }

      /* ── Share overlay ──────────────────────────────────────────────────── */
      .share-url-group { margin-bottom: 18px; }

      .share-url-label {
        font-size: 0.78rem;
        font-weight: 500;
        color: var(--text-2);
        margin-bottom: 6px;
        letter-spacing: 0.01em;
      }

      .share-url-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .share-url-input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 0.78rem;
        font-family: monospace;
        color: var(--text-2);
        background: var(--bg);
        outline: none;
        min-width: 0;
      }

      .share-warning {
        margin-top: 8px;
        padding: 10px 14px;
        background: rgba(245, 158, 11, 0.08);
        border: 1px solid rgba(245, 158, 11, 0.25);
        border-radius: 8px;
        font-size: 0.8rem;
        color: #fbbf24;
        line-height: 1.5;
      }

      /* ── Modal ──────────────────────────────────────────────────────────── */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.65);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .modal-backdrop.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        width: 400px;
        max-width: 92vw;
        position: relative;
        transform: translateY(16px);
        transition: transform 0.22s ease;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
      }

      .modal-backdrop.open .modal { transform: translateY(0); }

      .modal-body {
        padding: 26px 28px 30px;
      }

      .modal-body h2 {
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 20px;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 6px;
      }

      .confirm-row {
        margin-top: 8px;
        padding: 10px 14px;
        background: rgba(220, 38, 38, 0.1);
        border-radius: 8px;
      }

      .modal-close {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: none;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text-2);
        font-size: 13px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
        z-index: 1;
      }

      .modal-close:hover { background: rgba(255, 255, 255, 0.13); }

      /* ── Pin info ───────────────────────────────────────────────────────── */
      .pin-message {
        font-size: 0.95rem;
        line-height: 1.65;
        color: var(--text);
        margin-bottom: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .pin-date {
        font-size: 0.83rem;
        color: var(--text-2);
        margin-bottom: 8px;
      }

      .pin-coords {
        font-size: 0.75rem;
        color: var(--text-3);
        font-family: monospace;
        margin-bottom: 4px;
      }

      /* ── Spinner ────────────────────────────────────────────────────────── */
      .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(0, 0, 0, 0.2);
        border-top-color: #1a1a1a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        display: inline-block;
        vertical-align: middle;
      }

      .btn-ghost .spinner,
      .btn-danger-outline .spinner {
        border-color: rgba(255, 255, 255, 0.15);
        border-top-color: currentColor;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* ── Error toast ────────────────────────────────────────────────────── */
      .error-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--surface-hi);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 10px 20px;
        border-radius: 100px;
        font-size: 0.83rem;
        z-index: 9999;
        white-space: nowrap;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        animation: fadeInUp 0.2s ease;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateX(-50%) translateY(10px); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="app-root"></div>
    <div id="modal-root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
